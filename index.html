<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY FIX */
body {
  font-family: Arial;
  overflow: hidden; /* NO SCROLL */
  height: 100vh;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
}

/* FULL SCREEN STEP */
.step {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

.active {
  display: flex;
}

/* TEXT */
p {
  white-space: pre-line;
  font-size: 18px;
  line-height: 1.8;
  max-width: 600px;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 14px 25px;
  border: none;
  border-radius: 12px;
  background: white;
  color: #ff4f8b;
  font-weight: bold;
}

/* FOTO */
img {
  width: 90%;
  max-width: 300px;
  border-radius: 15px;
  margin-top: 10px;
}

/* HEART */
.heart {
  position: fixed;
  top: -10px;
  color: rgba(255,255,255,0.8);
  animation: fall linear infinite;
  z-index: 0;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>

</head>
<body>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<!-- STEP 1 -->
<div id="start" class="step active">
  <h1>Tap ❤️</h1>
  <button onclick="next('message1')">Tap</button>
</div>

<!-- STEP 2 -->
<div id="message1" class="step">
  <p id="typing1"></p>
  <button onclick="next('quiz')">Aku sudah membaca</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="step">
  <p id="question"></p>
  <div id="answers"></div>
</div>

<!-- AFTER QUIZ -->
<div id="afterQuiz" class="step">
  <button onclick="next('photos')">Aku pinter 😆</button>
</div>

<!-- FOTO -->
<div id="photos" class="step">
  <div id="photoBox"></div>
  <button onclick="next('message2')">Aku sudah liat</button>
</div>

<!-- PESAN 2 -->
<div id="message2" class="step">
  <p id="typing2"></p>
  <button onclick="next('end')">Okeee ❤️</button>
</div>

<!-- END -->
<div id="end" class="step">
  <h2>I LOVE YOU ❤️</h2>
</div>

<script>

// ===== NAVIGATION =====
function next(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id === "message1") {
    document.getElementById("music").play();
    type1();
  }
  if(id === "quiz") loadQuiz();
  if(id === "photos") showPhotos();
  if(id === "message2") type2();
}

// ===== TEXT 1 =====
let text1 = ">_< HAPPY ANNIVERSARY 2nd SAYAANGG >_<\n\n" +
"actually aku ga menyangka bgtt kita bisa sejauh ini, two years is a very long time, bukan hal mudah untuk kita sampai di titik ini, titik dimana kita benar benar sudah melewati banyak hal, happyness, sadness, dan emosional yg kita lalui bersama, 2 tahun bukanlah waktu yg sebentar, kita menghabiskan banyak energi untuk saling memahami masing-masing, dan alangkah beruntungnya kita, kita bisa melalui segala halang rintang yg harus jadi kendala\n\n" +
"I wish, setelah kita mencapai titik ini, kita menjadi lebih kuat, lebih saling memegang erat\n\n" +
"I hope, setelah banyak fase yg kita lalui, kita bisa belajar banyak hal, bagaimana cara menyikapi kesalah pahaman yg masing masing kita perbuat\n\n" +
"i want, we are still together, aku berharap bgtt apa yg kita mulai, akan berakhir dengan apa yg kita inginkan ❤️";

let i = 0;
function type1() {
  if(i < text1.length){
    typing1.innerHTML += text1[i];
    i++;
    setTimeout(type1, 40);
  }
}

// ===== QUIZ =====
let quiz = [
  {q:"tempat pertama ketemu?", a:["Instagram","Telegram","Michat"], c:1},
  {q:"tempat 2 tahun ini dimulai", a:["Whatsapp","Instagram","Tiktok"], c:0},
  {q:"gambar ikonik kita", a:["Naga","Titit","Bintang"], c:2},
  {q:"Siapa paling sayang?", a:["Aku","Kamu","Kita ❤️"], c:2}
];

let current = 0;

function loadQuiz(){
  let q = quiz[current];
  question.innerText = q.q;

  let html = "";
  q.a.forEach((ans,i)=>{
    html += `<button onclick="answer(${i})">${ans}</button><br>`;
  });
  answers.innerHTML = html;
}

function answer(i){
  if(i === quiz[current].c){
    current++;
    if(current < quiz.length){
      loadQuiz();
    } else {
      next("afterQuiz");
    }
  } else {
    alert("Salah 😝");
  }
}

// ===== FOTO =====
let photos = ["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg"];
let p = 0;

function showPhotos(){
  let box = document.getElementById("photoBox");
  box.innerHTML = "";
  p = 0;

  function nextPhoto(){
    if(p < photos.length){
      box.innerHTML += `<img src="${photos[p]}">`;
      p++;
      setTimeout(nextPhoto, 1500);
    }
  }

  nextPhoto();
}

// ===== TEXT 2 =====
let text2 = "sayaaangg di hari spesial kita ini, aku ingin kamu mengetahui satu hal, semua yg aku lakukan ke kamu, aku lakukan demi hubungan kita, maybe memang terkadang caraku kurang tepat, tapi aku selalu berharap bahwa aku bukan hanya menjadi teman ngobrol, aku berharap aku bisa menjadi pembimbing yg baik buat kamu, bisa menjadi pemimpin yg baik buat kamu, semua itu aku lakukan untuk kebaikan hubungan kita kedepannya\n\n" +
"two years isn't enough, aku ingin lebih lama lagi bersama kamu, still to be mine dan kita jaga hubungan ini selama lamanya ya sayaaanggg _<\n\n" +
"I LOVE UUUUUU 💗💗💗💗💗💗💗💗💗";

let j = 0;
function type2(){
  if(j < text2.length){
    typing2.innerHTML += text2[j];
    j++;
    setTimeout(type2, 40);
  }
}

// ===== HEART =====
function createHeart(){
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random()*100+"vw";
  heart.style.fontSize = (15+Math.random()*20)+"px";
  heart.style.animationDuration = (3+Math.random()*5)+"s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),8000);
}
setInterval(createHeart, 500);

</script>

</body>
  </html>
