<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu ❤️</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  text-align: center;
  color: white;
  margin: 0;
}

/* BIAR RAPI DI HP */
.hidden { display: none; }

/* JUDUL */
h1 {
  font-size: 32px;
}

/* TEKS UTAMA */
p {
  white-space: pre-line;
  font-size: 18px;
  line-height: 1.8;
  max-width: 90%;
  margin: auto;
}
  .center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
  animation: fadeIn 1s ease;text-align: center;
  }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
  body > div {
  position: relative;
  z-index: 1;
  }
  .center p {
  max-width: 600px;
  padding: 20px;
  }
/* TOMBOL */
button {
  padding: 15px 25px;
  margin-top: 20px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  background: white;
  color: #ff4f8b;
  font-weight: bold;
}

/* FOTO */
img {
  width: 90%;
  max-width: 300px;
  border-radius: 15px;
  margin-top: 15px;
}
  .heart {
  position: fixed;
  top: -10px;
  color: rgba(255,255,255,0.8);
  font-size: 20px;
  animation: fall linear infinite;
  z-index: 0;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
  .container, body > div {
  z-index: 1;
  }
  p {
  white-space: pre-line;
  }
</style>

</head>
<body>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<!-- STEP 1 -->
<div id="start">
  <h1>Tap ❤️</h1>
  <button onclick="startApp()">Tap</button>
</div>

<!-- STEP 2 -->
<div id="message1" class="hidden
  center">
  <p id="typing1"></p>
  <button onclick="startQuiz()">Aku sudah membaca</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
  <p id="question"></p>
  <div id="answers"></div>
</div>

<!-- STEP 8 -->
<div id="afterQuiz" class="hidden">
  <button onclick="showPhotos()">Aku pinter 😆</button>
</div>

<!-- FOTO -->
<div id="photos" class="hidden">
  <div id="photoBox"></div>
  <button onclick="afterPhotos()">Aku sudah liat</button>
</div>

<!-- PESAN AKHIR -->
<div id="message2" class="hidden
  center">
  <p id="typing2"></p>
  <button onclick="endApp()">Okeee ❤️</button>
</div>

<!-- END -->
<div id="end" class="hidden">
  <h2>Aku sayang kamu ❤️</h2>
</div>

<script>

// ===== START =====
function startApp() {
  document.getElementById("start").style.display = "none";
  document.getElementById("message1").style.display = "block";
  document.getElementById("music").play();
  type1();
}

// ===== TYPING 1 =====
let text1 = ">_< HAPPY ANNIVERSARY 2nd SAYAANGG >_<\n\n" +
"actually aku ga menyangka bgtt kita bisa sejauh ini, two years is a very long time, bukan hal mudah untuk kita sampai di titik ini, titik dimana kita benar benar sudah melewati banyak hal, happyness, sadness, dan emosional yg kita lalui bersama, 2 tahun bukanlah waktu yg sebentar, kita menghabiskan banyak energi untuk saling memahami masing-masing, dan alangkah beruntungnya kita, kita bisa melalui segala halang rintang yg harus jadi kendala.\n\n" +
"I wish, setelah kita mencapai titik ini, kita menjadi lebih kuat, lebih saling memegang erat.\n\n" +
"I hope, setelah banyak fase yg kita lalui, kita bisa belajar banyak hal, bagaimana cara menyikapi kesalah pahaman yg masing masing kita perbuat.\n\n" +
"i want, we are still together, aku berharap bgtt apa yg kita mulai, akan berakhir dengan apa yg kita inginkan ❤️";
let i = 0;

function type1() {
  if (i < text1.length) {
    document.getElementById("typing1").innerHTML += text1[i];
    i++;
    setTimeout(type1, 50);
  }
}

// ===== QUIZ =====
let quiz = [
  {q:"tempat pertama ketemu?", a:["Instagram","Telegram","Michat"], c:1},
  {q:"tempat 2 tahun ini dimulai", a:["Telegram","Instagram","Tiktok"], c:0},
  {q:"gambar ikonik kita", a:["Naga","Titit","Bintang"], c:2},
  {q:"Siapa paling sayang?", a:["Aku","Kamu","Kita ❤️"], c:2},
  {q:"Aku itu apa?", a:["Teman","Pacar","Segalanya ❤️"], c:2}
];

let current = 0;

function startQuiz() {
  document.getElementById("message1").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  loadQuiz();
}

function loadQuiz() {
  let q = quiz[current];
  document.getElementById("question").innerText = q.q;

  let html = "";
  q.a.forEach((ans, i) => {
    html += `<button onclick="answer(${i})">${ans}</button>`;
  });

  document.getElementById("answers").innerHTML = html;
}

function answer(i) {
  if (i === quiz[current].c) {
    current++;
    if (current < quiz.length) {
      loadQuiz();
    } else {
      document.getElementById("quiz").style.display = "none";
      document.getElementById("afterQuiz").style.display = "block";
    }
  } else {
    alert("Kamu salah 😝");
  }
}

// ===== FOTO =====
let photos = [
  {img:"foto1.jpg", text:"first pap uwu ❤️"},
  {img:"foto2.jpg", text:"pap paling imup 💕"},
  {img:"foto3.jpg", text:"first pap nakal 😍"},
  {img:"foto4.jpg", text:"filter paling cans ❤️"}
];

let p = 0;

function showPhotos() {
  document.getElementById("afterQuiz").style.display = "none";
  document.getElementById("photos").style.display = "block";
  nextPhoto();
}

function nextPhoto() {
  if (p < photos.length) {
    document.getElementById("photoBox").innerHTML +=
      `<img src="${photos[p].img}"><p>${photos[p].text}</p>`;
    p++;
    setTimeout(nextPhoto, 1500);
  }
}

// ===== PESAN AKHIR =====
let text2 = "sayaaangg di hari spesial kita ini, aku ingin kamu mengetahui satu hal, semua yg aku lakukan ke kamu, aku lakukan demi hubungan kita, maybe memang terkadang caraku kurang tepat, tapi aku selalu berharap bahwa aku bukan hanya menjadi teman ngobrol, aku berharap aku bisa menjadi pembimbing yg baik buat kamu, bisa menjadi pemimpin yg baik buat kamu, semua itu aku lakukan untuk kebaikan hubungan kita kedepannya\n\n" +
"two years isn't enough, aku ingin lebih lama lagi bersama kamu, still to be mine dan kita jaga hubungan ini selama lamanya ya sayaaanggg _<\n\n" +
"I LOVE UUUUUU 💗💗💗💗💗💗💗💗💗";
let j = 0;

function afterPhotos() {
  document.getElementById("photos").style.display = "none";
  document.getElementById("message2").style.display = "block";
  type2();
}

function type2() {
  if (j < text2.length) {
    document.getElementById("typing2").innerHTML += text2[j];
    j++;
    setTimeout(type2, 50);
  }
}

// ===== END =====
function endApp() {
  document.getElementById("message2").style.display = "none";
  document.getElementById("end").style.display = "block";
}
  function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  heart.style.animationDuration = (3 + Math.random() * 5) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 8000);
}

setInterval(createHeart, 500);

</script>

</body>
</html>
