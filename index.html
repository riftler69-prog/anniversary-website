<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu ❤️</title>

<style>
body {
  font-family: Arial;
  background: pink;
  text-align: center;
}
.hidden {
  display: none;
}
</style>

</head>
<body>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<div id="start">
  <h1>Tap ❤️</h1>
  <button onclick="start()">Tap</button>
</div>

<div id="message1" class="hidden">
  <p id="typing1"></p>
  <button onclick="toQuiz()">Aku sudah membaca</button>
</div>

<script>

let text = "Aku sayang kamu ❤️";
let i = 0;

function start() {
  document.getElementById("start").style.display = "none";
  document.getElementById("message1").style.display = "block";
  document.getElementById("music").play();
  typeText();
}

function typeText() {
  if (i < text.length) {
    document.getElementById("typing1").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 50);
  }
}

function toQuiz() {
  alert("Next step nanti kita lanjut 😄");
}

</script>

</body>
</html>
